name: 🔑 Configurar Secrets de R2 y Desplegar Functions

on:
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  secrets-and-deploy:
    name: Configurar los 4 secrets de R2 y desplegar las Cloud Functions
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Instalar Firebase CLI
        run: npm install -g firebase-tools

      - name: Instalar google-auth-library (para el script directo)
        run: |
          cd scripts
          npm init -y
          npm install google-auth-library

      - name: Configurar los 4 secrets de R2 (API directa de Secret Manager)
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          VAL_R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          VAL_R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          VAL_R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          VAL_R2_BUCKET: ${{ secrets.R2_BUCKET }}
        run: node scripts/set-r2-secrets-direct.mjs

      - name: Guardar credencial de servicio en archivo (para el deploy de abajo)
        run: echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT }}' > /tmp/sa.json

      - name: Instalar y compilar functions
        run: |
          cd functions
          npm ci
          npm run build

      - name: Desplegar 1 function sola (crea el bucket interno sin competencia)
        env:
          GOOGLE_APPLICATION_CREDENTIALS: /tmp/sa.json
        run: |
          set +e
          firebase deploy --project base-de-datos-vista360 --non-interactive --force \
            --only functions:generarReporteCliente,functions:listarReportesCliente,functions:eliminarReporteCliente \
            > /tmp/deploy-out-1.txt 2>&1
          cat /tmp/deploy-out-1.txt

      - name: Desplegar el resto de las Cloud Functions (callables normales)
        env:
          GOOGLE_APPLICATION_CREDENTIALS: /tmp/sa.json
        run: |
          set +e
          firebase deploy --project base-de-datos-vista360 --non-interactive --force \
            --only functions:crearSubidaR2,functions:subirAvatarServidor,functions:obtenerEspacioR2,functions:administrarClienteAdmin,functions:actualizarAvatarPropio,functions:firmarUrlsR2,functions:registrarAcceso,functions:registrarVisita,functions:listarAccesosClientes,functions:crearClienteAcceso,functions:actualizarAvatarCliente,functions:actualizarImagenCampania,functions:comprimirFacturaPdf,functions:administrarUsuarioPortal,functions:crearClienteNuevo,functions:crearPanel,functions:crearContrato,functions:eliminarContrato,functions:crearFacturaAdmin,functions:firmarDescargaFactura,functions:actualizarPanel,functions:actualizarClienteInfo,functions:actualizarNombreFactura,functions:marcarReporteVisto \
            > /tmp/deploy-out-2.txt 2>&1
          echo "exit_code=$?" >> "$GITHUB_OUTPUT"
          cat /tmp/deploy-out-2.txt
          cat /tmp/deploy-out-1.txt /tmp/deploy-out-2.txt > /tmp/deploy-out.txt

      # Estas 3 son funciones con TRIGGER (scheduler / Firestore), no
      # callables normales -- necesitan permisos de IAM extra
      # (Pub/Sub Token Creator, Eventarc Event Receiver) que esta
      # cuenta de servicio no puede otorgarse a si misma en este
      # proyecto. Van en un paso APARTE y con "set +e" a proposito:
      # si este paso falla por el tema de IAM, NO debe frenar ni
      # afectar el deploy de todas las demas funciones de arriba (esto
      # es justo lo que estaba pasando antes -- al estar todas juntas
      # en un solo --only, un fallo de IAM en estas 3 abortaba TODO el
      # lote entero, incluidas crearContrato/crearPanel/etc que no
      # tienen nada que ver con el problema).
      - name: Desplegar funciones con trigger (scheduler / Firestore) -- puede fallar sin frenar el resto
        env:
          GOOGLE_APPLICATION_CREDENTIALS: /tmp/sa.json
        run: |
          set +e
          firebase deploy --project base-de-datos-vista360 --non-interactive --force \
            --only functions:recordatorioVencimientoCampanas,functions:notificarReporteListo,functions:notificarFacturaNueva \
            > /tmp/deploy-out-3.txt 2>&1
          cat /tmp/deploy-out-3.txt
          cat /tmp/deploy-out-1.txt /tmp/deploy-out-2.txt /tmp/deploy-out-3.txt > /tmp/deploy-out.txt

      - name: Guardar resultado (diagnóstico)
        if: always()
        run: |
          mkdir -p .debug
          cp /tmp/deploy-out.txt .debug/deploy-functions-out.txt 2>/dev/null || true
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          git add .debug/deploy-functions-out.txt 2>/dev/null || true
          git commit -m "debug: resultado de deploy de functions" || echo "sin cambios"
          git push origin HEAD:debug-deploy-functions --force
