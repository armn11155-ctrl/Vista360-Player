name: 🔑 Configurar Secrets de R2 y Desplegar Functions

on:
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  secrets-and-deploy:
    name: Configurar los 4 secrets de R2 y desplegar las Cloud Functions
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Instalar Firebase CLI
        run: npm install -g firebase-tools

      - name: Guardar credencial de servicio en archivo
        run: echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT }}' > /tmp/sa.json

      - name: Configurar R2_ACCOUNT_ID
        env:
          GOOGLE_APPLICATION_CREDENTIALS: /tmp/sa.json
        run: printf '%s' "${{ secrets.R2_ACCOUNT_ID }}" | firebase functions:secrets:set R2_ACCOUNT_ID --data-file - --project base-de-datos-vista360 --non-interactive

      - name: Configurar R2_ACCESS_KEY_ID
        env:
          GOOGLE_APPLICATION_CREDENTIALS: /tmp/sa.json
        run: printf '%s' "${{ secrets.R2_ACCESS_KEY_ID }}" | firebase functions:secrets:set R2_ACCESS_KEY_ID --data-file - --project base-de-datos-vista360 --non-interactive

      - name: Configurar R2_SECRET_ACCESS_KEY
        env:
          GOOGLE_APPLICATION_CREDENTIALS: /tmp/sa.json
        run: printf '%s' "${{ secrets.R2_SECRET_ACCESS_KEY }}" | firebase functions:secrets:set R2_SECRET_ACCESS_KEY --data-file - --project base-de-datos-vista360 --non-interactive

      - name: Configurar R2_BUCKET
        env:
          GOOGLE_APPLICATION_CREDENTIALS: /tmp/sa.json
        run: printf '%s' "${{ secrets.R2_BUCKET }}" | firebase functions:secrets:set R2_BUCKET --data-file - --project base-de-datos-vista360 --non-interactive

      - name: Instalar dependencias de functions
        run: |
          cd functions
          npm ci

      - name: Desplegar Cloud Functions
        env:
          GOOGLE_APPLICATION_CREDENTIALS: /tmp/sa.json
        run: |
          set +e
          firebase deploy --project base-de-datos-vista360 --non-interactive \
            --only functions:crearSubidaR2,functions:firmarUrlsR2,functions:registrarAcceso,functions:registrarVisita,functions:listarAccesosClientes,functions:generarReporteCliente,functions:crearClienteAcceso,functions:actualizarAvatarCliente,functions:actualizarImagenCampania,functions:comprimirFacturaPdf,functions:administrarUsuarioPortal \
            > /tmp/deploy-out.txt 2>&1
          echo "exit_code=$?" >> "$GITHUB_OUTPUT"
          cat /tmp/deploy-out.txt

      - name: Guardar resultado (diagnóstico)
        if: always()
        run: |
          mkdir -p .debug
          cp /tmp/deploy-out.txt .debug/deploy-functions-out.txt 2>/dev/null || true
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          git add .debug/deploy-functions-out.txt 2>/dev/null || true
          git commit -m "debug: resultado de deploy de functions" || echo "sin cambios"
          git push origin HEAD:debug-deploy-functions --force
