<!DOCTYPE html>
<html lang="es" style="background:#050A12;color-scheme:dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
    <meta name="color-scheme" content="dark" />
    <style>
      html,body,#root{width:100%;height:100%;min-height:100%;margin:0;overflow:hidden;background:#050A12}
    </style>

    <meta name="theme-color" content="#050A12" />

    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json" />

    <!-- iOS -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Vista360 Player" />
    <meta name="format-detection" content="telephone=no" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="/apple-touch-icon.png" />
    <link rel="shortcut icon" href="/apple-touch-icon.png" />

    <!-- Adelanta la conexión del mapa para que Liberty empiece a cargar
         antes de que el cliente abra la sección Cobertura. -->
    <link rel="preconnect" href="https://tiles.openfreemap.org" crossorigin />
    <link rel="dns-prefetch" href="https://tiles.openfreemap.org" />

    <title>Vista360 Player</title>
  </head>
  <body style="background:#050A12;margin:0;overflow:hidden">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
